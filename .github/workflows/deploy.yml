name: $bog_vk

permissions: write-all

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
  schedule:
  - cron: "0 7 * * *"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - uses: hyoo-ru/mam_build@master2
      with:
        package: 'bog/vk'
        modules: 'app'

    - uses: hyoo-ru/gh-deploy@v4.4.1
      if: github.ref == 'refs/heads/master'
      with:
        folder: 'bog/vk/app/-'

    - name: Pack extension
      if: startsWith(github.ref, 'refs/tags/v')
      run: |
        cd bog/vk/app/-
        zip -r "$GITHUB_WORKSPACE/bog-vk-extension-${GITHUB_REF_NAME}.zip" .

    - name: Publish release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: bog-vk-extension-*.zip
        name: ${{ github.ref_name }}
        body: |
          ## Установка расширения вручную (Chrome / Edge / Brave)

          1. Скачай `bog-vk-extension-${{ github.ref_name }}.zip` ниже
          2. Распакуй архив в любую постоянную папку (если удалишь — расширение перестанет работать)
          3. Открой `chrome://extensions/`
          4. Включи **Режим разработчика** (тумблер справа сверху)
          5. Нажми **Загрузить распакованное расширение** и выбери распакованную папку
